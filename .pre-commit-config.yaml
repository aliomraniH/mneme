repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.8,<3
          - pydantic-settings>=2.5
          - fastapi>=0.115
          - psycopg[binary,pool]>=3.2
          - structlog>=24
          - httpx>=0.27
          - slowapi>=0.1.9
          - mcp>=1.0
